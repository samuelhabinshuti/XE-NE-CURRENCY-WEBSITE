<h2>Selected Currency Info</h2>

<div id="info"></div>

<script>
var currency = "RWF";

var data = {
    "RWF": {
        name: "Rwanda Franc",
        country: "Rwanda",
        symbol: "FRw",
        rate: "1 USD = 1400 RWF"
    },
    "UGX": {
        name: "Uganda Shilling",
        country: "Uganda",
        symbol: "USh",
        rate: "1 USD = 3800 UGX"
    },
    "KES": {
        name: "Kenya Shilling",
        country: "Kenya",
        symbol: "KSh",
        rate: "1 USD = 130 KES"
    },
    "CNY": {
        name: "Chinese Yuan",
        country: "China",
        symbol: "¥",
        rate: "1 USD = 7 CNY"
    }
};
var c = data[currency];

document.getElementById("info").innerHTML =
    "<p><b>Name:</b> " + c.name + "</p>" +
    "<p><b>Country:</b> " + c.country + "</p>" +
    "<p><b>Symbol:</b> " + c.symbol + "</p>" +
    "<p><b>Example Rate:</b> " + c.rate + "</p>";
</script><h3>Exchange Rate</h3>

<label>From:</label>
<select id="from">
    <option value="RWF">RWF</option>
    <option value="UGX">UGX</option>
    <option value="KES">KES</option>
    <option value="CNY">CNY</option>
</select>

<label>To:</label>
<select id="to">
    <option value="RWF">RWF</option>
    <option value="UGX">UGX</option>
    <option value="KES">KES</option>
    <option value="CNY">CNY</option>
</select>

<button onclick="showRate()">Show Rate</button>

<p id="rate"></p>

<script>
function showRate() {
    var from = document.getElementById("from").value;
    var to = document.getElementById("to").value;

    var rates = {
        "RWF": 1,
        "UGX": 0.37,
        "KES": 11,
        "CNY": 190
    };
    var result = (1 * rates[from]) / rates[to];

    document.getElementById("rate").innerHTML =
        "1 " + from + " = " + result.toFixed(4) + " " + to;
}
</script><h3>Comparison with Other Currencies</h3>

<select id="currency" onchange="showComparison()">
    <option value="RWF">Rwanda (RWF)</option>
    <option value="UGX">Uganda (UGX)</option>
    <option value="KES">Kenya (KES)</option>
    <option value="CNY">China (CNY)</option>
</select>

<p id="result"></p>

<script>
function showComparison() {

    var c = document.getElementById("currency").value;
    var text = "";

    if (c == "RWF") {
        text = "1 RWF = 0.37 UGX, 0.09 KES, 0.005 CNY";
    }
    else if (c == "UGX") {
        text = "1 UGX = 2.7 RWF, 0.03 KES, 0.002 CNY";
    }
    else if (c == "KES") {
        text = "1 KES = 11 RWF, 3 UGX, 0.05 CNY";
    }
    else if (c == "CNY") {
        text = "1 CNY = 190 RWF, 500 UGX, 20 KES";
    }

    document.getElementById("result").innerHTML = text;
}
</script>
